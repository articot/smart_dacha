[platformio]
build_dir = d:/.pio/build/smart-dacha-node
libdeps_dir = d:/.pio/libdeps/smart-dacha-node

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
lib_deps =
    adafruit/DHT sensor library @ ^1
    adafruit/Adafruit Unified Sensor @ ^1
monitor_speed = 115200
upload_port = COM7

